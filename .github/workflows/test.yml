name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Show browser environment
        run: |
          python3 --version
          rg --version | head -n 1
          google-chrome --version || chromium --version
      - name: Run extension tests
        run: bash scripts/test.sh
